<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Inf — aloo_123_go console</title>
    <meta name="color-scheme" content="dark light" />
    <style>
      :root{
        --bg:#0b0f15;
        --panel:#0f1622;
        --panel2:#121c2a;
        --text:#e6edf3;
        --muted:#9fb0c0;
        --line:#1f2b3b;
        --brand:#7c5cff;
        --brand2:#00d4ff;
        --good:#2ce08a;
        --warn:#ffcc66;
        --bad:#ff5c7a;
        --shadow: rgba(0,0,0,.35);
        --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
        --r:14px;
      }
      @media (prefers-color-scheme: light){
        :root{
          --bg:#f6f7fb;
          --panel:#ffffff;
          --panel2:#fbfcff;
          --text:#10151d;
          --muted:#556778;
          --line:#e2e8f0;
          --shadow: rgba(16,21,29,.08);
        }
      }
      *{box-sizing:border-box}
      html,body{height:100%}
      body{
        margin:0;
        font-family:var(--sans);
        background: radial-gradient(1100px 600px at 10% 0%, rgba(124,92,255,.18), transparent 55%),
                    radial-gradient(900px 600px at 95% 12%, rgba(0,212,255,.12), transparent 60%),
                    var(--bg);
        color:var(--text);
      }
      a{color:inherit}
      .wrap{
        max-width:1280px;
        margin:0 auto;
        padding:24px;
      }
      .topbar{
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap:16px;
        padding:16px 18px;
        border:1px solid var(--line);
        background: linear-gradient(180deg, rgba(255,255,255,.04), transparent), var(--panel);
        border-radius:var(--r);
        box-shadow: 0 12px 28px var(--shadow);
      }
      .brand{
        display:flex;
        align-items:center;
        gap:12px;
        min-width:260px;
      }
      .mark{
        width:38px;height:38px;border-radius:12px;
        background: conic-gradient(from 210deg, var(--brand), var(--brand2), var(--brand));
        box-shadow: 0 10px 25px rgba(124,92,255,.18);
      }
      .brand h1{
        margin:0;
        font-size:14px;
        letter-spacing:.12em;
        text-transform:uppercase;
      }
      .brand small{display:block;color:var(--muted);margin-top:2px;letter-spacing:0;text-transform:none}
      .right{
        display:flex;
        align-items:center;
        gap:10px;
        flex-wrap:wrap;
        justify-content:flex-end;
      }
      .pill{
        display:inline-flex;
        align-items:center;
        gap:8px;
        padding:8px 10px;
        border:1px solid var(--line);
        border-radius:999px;
        background: rgba(255,255,255,.03);
      }
      .dot{width:9px;height:9px;border-radius:999px;background:var(--muted)}
      .dot.ok{background:var(--good)}
      .dot.warn{background:var(--warn)}
      .dot.bad{background:var(--bad)}
      .mono{font-family:var(--mono)}
      input,select,textarea,button{
        font:inherit;
        color:inherit;
      }
      .in{
        padding:10px 12px;
        border-radius:12px;
        border:1px solid var(--line);
        background: var(--panel2);
        outline:none;
        min-width: 240px;
      }
      .in:focus{border-color: rgba(124,92,255,.55); box-shadow:0 0 0 4px rgba(124,92,255,.12)}
      .btn{
        padding:10px 12px;
        border-radius:12px;
        border:1px solid var(--line);
        background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
        cursor:pointer;
        transition: transform .06s ease, border-color .12s ease;
      }
      .btn:hover{transform: translateY(-1px); border-color: rgba(124,92,255,.45)}
      .btn:active{transform: translateY(0)}
      .btn.primary{
        border-color: rgba(124,92,255,.35);
        background: linear-gradient(180deg, rgba(124,92,255,.28), rgba(124,92,255,.10));
      }
      .btn.danger{
        border-color: rgba(255,92,122,.30);
        background: linear-gradient(180deg, rgba(255,92,122,.22), rgba(255,92,122,.08));
      }
      .grid{
        display:grid;
        grid-template-columns: 380px 1fr;
        gap:18px;
        margin-top:18px;
        align-items:start;
      }
      @media (max-width: 980px){
        .grid{grid-template-columns:1fr}
        .brand{min-width:auto}
        .in{min-width: 180px}
      }
      .card{
        border:1px solid var(--line);
        background: linear-gradient(180deg, rgba(255,255,255,.03), transparent), var(--panel);
        border-radius:var(--r);
        box-shadow: 0 10px 24px var(--shadow);
        overflow:hidden;
      }
      .card .hd{
        padding:14px 16px;
        border-bottom:1px solid var(--line);
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap:10px;
      }
      .card .hd h2{
        margin:0;
        font-size:13px;
        letter-spacing:.08em;
        text-transform:uppercase;
        color:var(--muted);
      }
      .card .bd{padding:14px 16px}
      .tabs{
        display:flex;
        gap:8px;
        flex-wrap:wrap;
      }
      .tab{
        padding:8px 10px;
        border:1px solid var(--line);
        border-radius:999px;
        background: rgba(255,255,255,.02);
        cursor:pointer;
        user-select:none;
      }
      .tab.on{
        border-color: rgba(124,92,255,.55);
        background: rgba(124,92,255,.12);
      }
      .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
      .row + .row{margin-top:10px}
      label{color:var(--muted);font-size:12px}
      .k{display:flex;flex-direction:column;gap:6px;min-width: 180px}
      .k.wide{min-width: 260px; flex:1}
      textarea.in{min-height: 130px; resize: vertical; font-family: var(--mono); font-size: 12px; line-height: 1.45}
      .list{
        display:flex; flex-direction:column; gap:10px;
      }
      .item{
        border:1px solid var(--line);
        background: rgba(255,255,255,.02);
        border-radius:14px;
        padding:12px;
        cursor:pointer;
        transition: border-color .12s ease, transform .06s ease;
      }
      .item:hover{transform: translateY(-1px); border-color: rgba(124,92,255,.40)}
      .item.on{border-color: rgba(0,212,255,.45); background: rgba(0,212,255,.06)}
      .item h3{margin:0;font-size:14px}
      .item small{color:var(--muted)}
      .split{display:flex; justify-content:space-between; gap:10px; align-items:center}
      .badge{
        font-size:12px;
        color:var(--muted);
        border:1px solid var(--line);
        border-radius:999px;
        padding:5px 8px;
      }
      .muted{color:var(--muted)}
      .hr{height:1px;background:var(--line); margin:14px 0}
      .chartBox{
        border:1px solid var(--line);
        background: rgba(255,255,255,.02);
        border-radius: 14px;
        overflow:hidden;
      }
      canvas{display:block;width:100%;height:260px}
      .logBox{
        border:1px solid var(--line);
        background: rgba(255,255,255,.02);
        border-radius:14px;
        overflow:hidden;
      }
      .logHd{
        display:flex; align-items:center; justify-content:space-between; gap:10px;
        padding:10px 12px;
        border-bottom:1px solid var(--line);
      }
      .log{
        font-family: var(--mono);
        font-size: 12px;
        line-height: 1.35;
        height: 320px;
        overflow:auto;
        padding:10px 12px;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .lvl-INFO{color: var(--text)}
      .lvl-WARN{color: var(--warn)}
      .lvl-ERROR{color: var(--bad)}
      .foot{
        margin-top:16px;
        color:var(--muted);
        font-size:12px;
        display:flex;
        justify-content:space-between;
        gap:10px;
        flex-wrap:wrap;
      }
      .tiny{font-size:11px}
      .hint{
        padding:10px 12px;
        border:1px dashed rgba(124,92,255,.35);
        background: rgba(124,92,255,.08);
        border-radius: 14px;
        color: var(--muted);
      }
      .err{
        padding:10px 12px;
        border:1px solid rgba(255,92,122,.35);
        background: rgba(255,92,122,.08);
        border-radius: 14px;
      }
      .ok{
        padding:10px 12px;
        border:1px solid rgba(44,224,138,.35);
        background: rgba(44,224,138,.08);
        border-radius: 14px;
      }
      .two{
        display:grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      @media (max-width: 980px){ .two{grid-template-columns:1fr} }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="topbar">
        <div class="brand">
          <div class="mark" aria-hidden="true"></div>
          <div>
            <h1>Inf</h1>
            <small>signal desk UI for <span class="mono">aloo_123_go</span></small>
          </div>
        </div>

        <div class="right">
          <div class="pill">
            <span id="dotApi" class="dot"></span>
            <span class="tiny muted">API</span>
            <span id="apiState" class="mono tiny">disconnected</span>
          </div>
          <input id="apiBase" class="in mono" placeholder="http://localhost:8787" />
          <button id="btnConnect" class="btn primary">Connect</button>
          <button id="btnPing" class="btn">Ping</button>
        </div>
      </div>

      <div class="grid">
        <div class="card">
          <div class="hd">
            <h2>Strategies</h2>
            <div class="row">
              <button id="btnNew" class="btn">New</button>
              <button id="btnRefresh" class="btn">Refresh</button>
            </div>
          </div>
          <div class="bd">
            <div id="strategyHint" class="hint">
              Tip: create strategies here, then backtest them using pasted CSV candles.
              The server is local; nothing is sent anywhere.
            </div>
            <div class="hr"></div>
            <div id="strategyList" class="list"></div>
          </div>
        </div>

        <div class="card">
          <div class="hd">
            <h2>Workbench</h2>
            <div class="tabs">
              <div class="tab on" data-tab="editor">Editor</div>
              <div class="tab" data-tab="backtest">Backtest</div>
              <div class="tab" data-tab="logs">Logs</div>
              <div class="tab" data-tab="settings">Settings</div>
            </div>
          </div>
          <div class="bd">
            <div id="pane_editor" class="pane"></div>
            <div id="pane_backtest" class="pane" style="display:none"></div>
            <div id="pane_logs" class="pane" style="display:none"></div>
            <div id="pane_settings" class="pane" style="display:none"></div>
          </div>
        </div>
      </div>

      <div class="foot">
        <div>Inf UI is static; it only talks to your local API base.</div>
        <div class="mono">v2026.05.07</div>
      </div>
    </div>

    <script>
      // ---------------------------- State ----------------------------
      const S = {
        apiBase: localStorage.getItem("inf.apiBase") || "http://localhost:8787",
        apiOk: false,
        strategies: [],
        selectedId: null,
        settings: null,
        logs: [],
        sse: null,
        backtest: {
          csv: "",
          symbol: "ETHUSD",
          startCash: 10000,
          minTradeCash: 25,
          maxBytes: 5000000,
          result: null
        }
      };

      const $ = (sel) => document.querySelector(sel);
      const $$ = (sel) => Array.from(document.querySelectorAll(sel));

      // ---------------------------- UI init ----------------------------
      $("#apiBase").value = S.apiBase;
      $("#btnConnect").addEventListener("click", () => connect());
      $("#btnPing").addEventListener("click", () => ping());
      $("#btnNew").addEventListener("click", () => newStrategy());
      $("#btnRefresh").addEventListener("click", () => refreshStrategies());

      $$(".tab").forEach(t => t.addEventListener("click", () => setTab(t.dataset.tab)));

      renderEditor();
      renderBacktest();
      renderLogs();
      renderSettings();

      // Auto-connect best effort
      connect({ silent: true });

      // ---------------------------- Tabs ----------------------------
      function setTab(name){
        $$(".tab").forEach(t => t.classList.toggle("on", t.dataset.tab === name));
        ["editor","backtest","logs","settings"].forEach(n => {
          $("#pane_"+n).style.display = (n === name) ? "" : "none";
        });
      }

      // ---------------------------- API helpers ----------------------------
      function apiUrl(path){
        const base = (S.apiBase || "").replace(/\/+$/,"");
        return base + path;
      }

      async function apiGet(path){
        const res = await fetch(apiUrl(path), { method:"GET" });
        const txt = await res.text();
        let json = null;
        try{ json = JSON.parse(txt); }catch(e){ json = { ok:false, error:"bad_json", raw:txt }; }
        if (!res.ok) throw new Error(json && json.error ? json.error : ("http_" + res.status));
        return json;
      }

      async function apiSend(path, method, body){
        const res = await fetch(apiUrl(path), {
          method,
          headers: { "Content-Type":"application/json" },
          body: body ? JSON.stringify(body) : undefined
        });
        const txt = await res.text();
        let json = null;
        try{ json = JSON.parse(txt); }catch(e){ json = { ok:false, error:"bad_json", raw:txt }; }
        if (!res.ok) throw new Error(json && json.error ? json.error : ("http_" + res.status));
        return json;
      }

      function setApiState(ok, label){
        S.apiOk = ok;
        $("#apiState").textContent = label || (ok ? "connected" : "disconnected");
        $("#dotApi").className = "dot " + (ok ? "ok" : "bad");
      }

      // ---------------------------- Connect / ping ----------------------------
      async function connect(opts = {}){
        const base = $("#apiBase").value.trim();
        if (!base) return;
        S.apiBase = base;
        localStorage.setItem("inf.apiBase", base);
        if (!opts.silent) setApiState(false, "connecting...");
        try{
          const st = await apiGet("/api/status");
          if (!st.ok) throw new Error(st.error || "status_not_ok");
          setApiState(true, "ok");
          await Promise.all([refreshStrategies(), refreshSettings()]);
          startSse();
        }catch(e){
          setApiState(false, "down");
          stopSse();
          if (!opts.silent) toast("API not reachable: " + e.message, "bad");
        }
      }

      async function ping(){
        try{
          const st = await apiGet("/api/status");
          setApiState(true, "ok");
          toast("pong: " + (st.name || "api"), "ok");
        }catch(e){
          setApiState(false, "down");
          toast("ping failed: " + e.message, "bad");
        }
      }

      // ---------------------------- Strategies ----------------------------
      async function refreshStrategies(){
        if (!S.apiOk) return;
        try{
          const res = await apiGet("/api/strategies");
          S.strategies = res.strategies || [];
          if (!S.selectedId && S.strategies.length) S.selectedId = S.strategies[0].id;
          if (S.selectedId && !S.strategies.some(s => s.id === S.selectedId)) S.selectedId = null;
          renderStrategyList();
          renderEditor();
          renderBacktest();
        }catch(e){
          toast("failed to load strategies: " + e.message, "bad");
        }
      }

      function newStrategy(){
        const s = defaultStrategy();
        s.name = "New Strategy " + randTag();
        s.symbol = S.backtest.symbol || "ETHUSD";
        s.id = "tmp_" + randTag() + "_" + Math.floor(Math.random()*1000);
        // UI-side temp; saved on POST
        S.selectedId = s.id;
        S.strategies = [s, ...S.strategies];
        renderStrategyList();
        renderEditor({ force: true, draft: s });
        setTab("editor");
      }

      function renderStrategyList(){
        const box = $("#strategyList");
        box.innerHTML = "";
        if (!S.strategies.length){
          $("#strategyHint").style.display = "";
          const empty = document.createElement("div");
          empty.className = "muted";
          empty.textContent = "No strategies yet.";
          box.appendChild(empty);
          return;
        }
        $("#strategyHint").style.display = "none";

        const sorted = [...S.strategies].sort((a,b) => (b.updatedAt||0) - (a.updatedAt||0));
        sorted.forEach(s => {
          const it = document.createElement("div");
          it.className = "item " + (S.selectedId === s.id ? "on" : "");
          it.addEventListener("click", () => { S.selectedId = s.id; renderStrategyList(); renderEditor(); renderBacktest(); });

          const top = document.createElement("div");
          top.className = "split";
          const left = document.createElement("div");
          left.innerHTML = `<h3>${escapeHtml(s.name||"(unnamed)")}</h3><small>${escapeHtml(s.symbol||"")}</small>`;
          const right = document.createElement("div");
          right.innerHTML = `<span class="badge mono">${escapeHtml(s.id||"")}</span>`;
          top.appendChild(left);
          top.appendChild(right);

          it.appendChild(top);
          box.appendChild(it);
        });
      }

      function selectedStrategy(){
        if (!S.selectedId) return null;
        return S.strategies.find(x => x.id === S.selectedId) || null;
      }

      // ---------------------------- Editor pane ----------------------------
      function renderEditor(opts = {}){
        const pane = $("#pane_editor");
        const s = opts.draft || selectedStrategy();
        if (!s){
          pane.innerHTML = `<div class="muted">Select a strategy to edit.</div>`;
          return;
        }
        const rules = s.rules || defaultStrategy().rules;

        pane.innerHTML = `
          <div class="two">
            <div class="k wide">
              <label>Strategy name</label>
              <input id="ed_name" class="in" value="${escapeAttr(s.name||"")}" />
            </div>
            <div class="k">
              <label>Symbol (label only)</label>
              <input id="ed_symbol" class="in mono" value="${escapeAttr(s.symbol||"ETHUSD")}" />
            </div>
          </div>
          <div class="hr"></div>
          <div class="two">
            <div class="k">
              <label>EMA fast</label>
              <input id="ed_emaFast" class="in mono" value="${num(rules.emaFast)}" />
            </div>
            <div class="k">
              <label>EMA slow</label>
